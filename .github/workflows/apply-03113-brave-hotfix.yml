name: Apply Brave Studio deadlock hotfix

on:
  push:
    branches:
      - agent/fix-brave-studio-deadlock-0.3.113
    paths:
      - .github/hotfix-03113.trigger
  pull_request:
    branches:
      - main
    paths:
      - .github/hotfix-03113.trigger
      - scripts/apply_03113_brave_hotfix.py
      - scripts/smoke_brave_studio_routing.mjs
      - .github/workflows/apply-03113-brave-hotfix.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: agent/fix-brave-studio-deadlock-0.3.113
    steps:
      - name: Apply, validate, package, and commit hotfix
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git clone -q "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          git checkout -q "$TARGET_BRANCH"

          if ! grep -q '"version": "0.3.113"' manifest.json; then
            python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/apply_03113_brave_hotfix.py')
          text = path.read_text(encoding='utf-8')
          old = '''lock_path = Path("package-lock.json")
          lock = json.loads(lock_path.read_text(encoding="utf-8"))
          lock["version"] = "0.3.113"
          if "" in lock.get("packages", {}):
              lock["packages"][""]["version"] = "0.3.113"
          lock_path.write_text(json.dumps(lock, indent=2, ensure_ascii=False) + "\\n", encoding="utf-8")
          '''
          new = '''lock_path = Path("package-lock.json")
          if lock_path.exists():
              lock = json.loads(lock_path.read_text(encoding="utf-8"))
              lock["version"] = "0.3.113"
              if "" in lock.get("packages", {}):
                  lock["packages"][""]["version"] = "0.3.113"
              lock_path.write_text(json.dumps(lock, indent=2, ensure_ascii=False) + "\\n", encoding="utf-8")
          '''
          if old not in text:
              raise SystemExit('package-lock patch anchor not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
            python3 scripts/apply_03113_brave_hotfix.py
          else
            echo "Hotfix source already applied; validating final tree."
          fi

          npm run check
          npm run package
          rm -f scripts/apply_03113_brave_hotfix.py .github/hotfix-03113.trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Fix Brave Studio background deadlock in 0.3.113"
            git push -q origin HEAD:"$TARGET_BRANCH"
          fi
