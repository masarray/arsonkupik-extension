name: Apply P0 protected audio transitions

on:
  push:
    branches:
      - agent/p0-protected-audio-transitions

permissions:
  contents: write

jobs:
  apply-p0:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Apply audited P0 patch
        env:
          PATCH_XZ_BASE64: ""
        run: |
          python - <<'PY'
          import base64
          import lzma
          import os
          from pathlib import Path
          patch = lzma.decompress(base64.b64decode(os.environ['PATCH_XZ_BASE64']))
          Path('/tmp/p0.patch').write_bytes(patch)
          PY
          git apply --check /tmp/p0.patch
          git apply /tmp/p0.patch

      - name: Validate syntax and repository
        run: |
          node --check src/offscreen/offscreen.js
          node scripts/smoke_stability.mjs
          npm check

      - name: Commit P0 implementation
        run: |
          rm .github/workflows/apply-p0-protected-audio-transitions.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/offscreen/offscreen.js scripts/smoke_stability.mjs .github/workflows/apply-p0-protected-audio-transitions.yml
          git commit -m "Protect all discontinuous DSP transitions"
          git push origin HEAD:agent/p0-protected-audio-transitions
