name: Apply repository relocation

on:
  push:
    branches:
      - fix/repository-relocation-ci
    paths:
      - scripts/apply_repository_relocation.py
      - .github/workflows/apply-repository-relocation.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply_repository_relocation.py
      - .github/workflows/apply-repository-relocation.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: fix/repository-relocation-ci
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply repository relocation
        run: python3 scripts/apply_repository_relocation.py

      - name: Remove temporary migration script
        run: rm scripts/apply_repository_relocation.py

      - name: Run release-grade validation
        run: |
          npm run release:check
          npm run package
          ZIP=$(find dist -maxdepth 1 -name 'ArSonKuPik-v*-chrome-web-store.zip' -print -quit)
          test -n "$ZIP"
          unzip -t "$ZIP"

      - name: Create local migration commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git restore --staged .github/workflows/validate.yml .github/workflows/release.yml
          git restore .github/workflows/validate.yml .github/workflows/release.yml
          git commit -m "fix: migrate repository URLs and package only runtime assets"

      - name: Publish commit through Git Data API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: fix/repository-relocation-ci
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          branch = os.environ["TARGET_BRANCH"]
          api = f"https://api.github.com/repos/{repo}"

          def request(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  api + path,
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "arsonkupik-relocation-workflow",
                  },
              )
              with urllib.request.urlopen(req) as response:
                  return json.load(response)

          parent = subprocess.check_output(["git", "rev-parse", "HEAD^"], text=True).strip()
          diff = subprocess.check_output(
              ["git", "diff", "--name-status", "--no-renames", "HEAD^", "HEAD"],
              text=True,
          ).splitlines()
          base_commit = request("GET", f"/git/commits/{parent}")
          entries = []
          for line in diff:
              status, path = line.split("\t", 1)
              if status == "D":
                  entries.append({"path": path, "mode": "100644", "type": "blob", "sha": None})
                  continue
              content = open(path, "rb").read()
              blob = request(
                  "POST",
                  "/git/blobs",
                  {"content": base64.b64encode(content).decode("ascii"), "encoding": "base64"},
              )
              entries.append({"path": path, "mode": "100644", "type": "blob", "sha": blob["sha"]})

          tree = request("POST", "/git/trees", {"base_tree": base_commit["tree"]["sha"], "tree": entries})
          commit = request(
              "POST",
              "/git/commits",
              {
                  "message": "fix: migrate repository URLs and package only runtime assets",
                  "tree": tree["sha"],
                  "parents": [parent],
              },
          )
          request("PATCH", f"/git/refs/heads/{branch}", {"sha": commit["sha"], "force": False})
          print(f"Published migration commit {commit['sha']}")
          PY
