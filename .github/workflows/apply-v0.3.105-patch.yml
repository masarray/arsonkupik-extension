name: Apply v0.3.105 patch

on:
  push:
    branches:
      - agent/release-stability-v0.3.105
    paths:
      - scripts/apply_v0_3_105_patch.py
      - .github/workflows/apply-v0.3.105-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: agent/release-stability-v0.3.105
          fetch-depth: 0

      - name: Apply audited patch
        run: python3 scripts/apply_v0_3_105_patch.py

      - name: Validate patched repository
        run: |
          npm run check
          npm run release:check
          npm run package
          ZIP=$(find dist -maxdepth 1 -name 'ArSonKuPik-v0.3.105-chrome-web-store.zip' -print -quit)
          test -n "$ZIP"
          unzip -t "$ZIP"
          (cd dist && sha256sum -c SHA256SUMS.txt)

      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Fix release stability and publish metadata for v0.3.105"
          git push origin HEAD:agent/release-stability-v0.3.105
