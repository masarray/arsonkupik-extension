name: Apply P1 latest preset queue once

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply-p1:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/p1-latest-preset-wins'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply P1 patch and validate
        env:
          PATCH_XZ_BASE64: ""
        run: |
          printf '%s' "$PATCH_XZ_BASE64" | base64 -d | xz -d > /tmp/p1.patch
          git apply --check /tmp/p1.patch
          git apply /tmp/p1.patch
          node --check src/shared/state-command-scheduler.js
          node --check src/background/service-worker.js
          node scripts/smoke_global_state_queue.mjs
          npm run check

      - name: Commit production patch and remove workflow
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-p1-latest-preset-once.yml
          git add src/shared/state-command-scheduler.js src/background/service-worker.js scripts/smoke_global_state_queue.mjs
          git commit -m "Coalesce rapid preset commands safely"
          git push origin HEAD:"$HEAD_REF"
