name: Apply v0.3.108 audible-route hotfix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/audio-silence-v0.3.108'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Apply hotfix
        run: python3 scripts/apply_v0_3_108_patch.py

      - name: Commit product changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            manifest.json \
            package.json \
            .release/release.json \
            src/offscreen/offscreen.js \
            scripts/smoke_headless.mjs \
            scripts/smoke_audio_route.mjs \
            README.md \
            docs/index.html \
            docs/id/index.html \
            CHANGELOG.md \
            RELEASE_AUDIT_0.3.108.md
          if git diff --cached --quiet; then
            echo 'Hotfix already applied.'
            exit 0
          fi
          git commit -m 'Preserve audible tab route for v0.3.108'
          git push origin HEAD:${GITHUB_HEAD_REF}
