name: Validate repository

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"

      - name: Run complete repository checks
        run: npm run check

      - name: Build extension package
        run: npm run package

      - name: Verify archive integrity, root structure, locales, and checksum
        shell: bash
        run: |
          set -euo pipefail
          ZIP=$(find dist -maxdepth 1 -name 'ArSonKuPik-v*-chrome-web-store.zip' -print -quit)
          test -n "$ZIP"
          test -f dist/SHA256SUMS.txt
          unzip -t "$ZIP"
          unzip -l "$ZIP"
          rm -rf dist/webstore-unpacked
          mkdir -p dist/webstore-unpacked
          unzip -q "$ZIP" -d dist/webstore-unpacked
          test -f dist/webstore-unpacked/manifest.json
          test -f dist/webstore-unpacked/_locales/en/messages.json
          test -f dist/webstore-unpacked/_locales/id/messages.json
          test ! -e dist/webstore-unpacked/ArSonKuPik-unpacked/manifest.json
          python3 scripts/validate_release_artifact.py
          (cd dist && sha256sum -c SHA256SUMS.txt)

      - name: Upload validated Web Store release candidate
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ArSonKuPik-webstore-${{ github.sha }}
          path: |
            dist/ArSonKuPik-v*-chrome-web-store.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
