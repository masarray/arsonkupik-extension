name: Validate repository

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Run complete repository checks
        run: npm run check

      - name: Build extension package
        run: npm run package

      - name: Verify archive integrity and contents
        shell: bash
        run: |
          ZIP=$(find dist -maxdepth 1 -name 'ArSonKuPik-v*-chrome-web-store.zip' -print -quit)
          test -n "$ZIP"
          unzip -t "$ZIP"
          unzip -l "$ZIP"

      - name: Upload validated Web Store release candidate
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ArSonKuPik-webstore-${{ github.sha }}
          path: |
            dist/ArSonKuPik-v*-chrome-web-store.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
