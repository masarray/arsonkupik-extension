name: Validate repository

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"

      - name: Apply audited v0.3.105 patch
        id: apply_patch
        if: github.event_name == 'pull_request'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          if grep -q '"version": "0.3.105"' manifest.json; then
            echo "Patch already applied." | tee /tmp/patch.log
            exit 0
          fi
          python3 -u scripts/apply_v0_3_105_patch.py > /tmp/patch.log 2>&1
          STATUS=$?
          cat /tmp/patch.log
          if [ "$STATUS" -ne 0 ]; then
            exit "$STATUS"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix release stability and publish metadata for v0.3.105"
          git push origin HEAD:${GITHUB_HEAD_REF}

      - name: Upload patch diagnostics
        if: steps.apply_patch.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: patch-diagnostics-${{ github.sha }}
          path: /tmp/patch.log
          if-no-files-found: error
          retention-days: 2
          compression-level: 0

      - name: Stop after patch failure
        if: steps.apply_patch.outcome == 'failure'
        run: exit 1

      - name: Run complete repository checks
        run: npm run check

      - name: Build extension package
        run: npm run package

      - name: Verify archive integrity and contents
        shell: bash
        run: |
          ZIP=$(find dist -maxdepth 1 -name 'ArSonKuPik-v*-chrome-web-store.zip' -print -quit)
          test -n "$ZIP"
          unzip -t "$ZIP"
          unzip -l "$ZIP"
          (cd dist && sha256sum -c SHA256SUMS.txt)

      - name: Upload validated Web Store release candidate
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ArSonKuPik-webstore-${{ github.sha }}
          path: |
            dist/ArSonKuPik-v*-chrome-web-store.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
