name: Validate repository

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate repository
        run: python3 scripts/validate.py

      - name: Build extension package
        run: python3 scripts/package_extension.py

      - name: Inspect archive
        run: unzip -l dist/ArSonKuPik-v*-chrome-web-store.zip
