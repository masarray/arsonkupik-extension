name: Activate official QRIS

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  activate:
    if: github.head_ref == 'feat/activate-official-qris'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout activation branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22'

      - name: Verify and activate official QRIS
        shell: bash
        run: |
          set -euo pipefail
          echo '6dd16a4ecda280b17e303c253c8619fdd43e3ca945f033f0608ec14435ff9b15  docs/assets/qris-arsonkupik.svg' | sha256sum -c -
          grep -Fq 'NMID ID1026551401775' docs/assets/qris-arsonkupik.svg
          grep -Fq 'SONKUPIK, AUDIO DEVELOPER, DIGITAL &amp; KREATIF' docs/assets/qris-arsonkupik.svg
          python3 scripts/activate_official_qris.py
          npm run check

      - name: Commit activated support page
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/support-config.js docs/id/dukung.html docs/sitemap.xml
          if git diff --cached --quiet; then
            echo 'QRIS activation already committed.'
            exit 0
          fi
          git commit -m 'Activate official SonkuPik merchant QRIS'
          git push origin HEAD:${GITHUB_HEAD_REF}
