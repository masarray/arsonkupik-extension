name: Activate official QRIS

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inventory:
    if: github.head_ref == 'feat/activate-official-qris'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout activation branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Inventory candidate QRIS blobs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -u
          mkdir -p qris-inventory/files
          : > qris-inventory/hashes.txt
          for blob in \
            850a627211512e2b047c38dc81a4461645a28e24 \
            b6ff071353604511c3feb45f3c98963b61be8f7e \
            5e351c235ebed02a44c90f7c30478d4dae2dd9f0
          do
            candidate="qris-inventory/files/${blob}.bin"
            if gh api -H 'Accept: application/vnd.github.raw+json' "repos/${GITHUB_REPOSITORY}/git/blobs/${blob}" > "$candidate"; then
              digest=$(sha256sum "$candidate" | awk '{print $1}')
              bytes=$(wc -c < "$candidate")
              kind=$(file -b "$candidate")
              printf '%s  %s  %s bytes  %s\n' "$blob" "$digest" "$bytes" "$kind" >> qris-inventory/hashes.txt
            else
              printf '%s  FETCH_FAILED\n' "$blob" >> qris-inventory/hashes.txt
              rm -f "$candidate"
            fi
          done
          cat qris-inventory/hashes.txt

      - name: Upload candidate inventory
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: qris-candidate-inventory-${{ github.sha }}
          path: qris-inventory
          if-no-files-found: error
          retention-days: 2
          compression-level: 0
