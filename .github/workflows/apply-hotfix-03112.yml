name: Apply Studio freeze hotfix metadata

on:
  push:
    branches:
      - agent/hotfix-studio-freeze-0.3.112
    paths:
      - .github/hotfix-03112.trigger

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: agent/hotfix-studio-freeze-0.3.112
    steps:
      - name: Synchronize metadata, validate, package, and commit
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git clone -q "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          git checkout -q "$TARGET_BRANCH"
          python3 scripts/apply_hotfix_03112_metadata.py
          npm run check
          npm run package
          rm -f scripts/apply_hotfix_03112_metadata.py .github/hotfix-03112.trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Finalize Studio freeze hotfix 0.3.112"
            git push -q origin HEAD:"$TARGET_BRANCH"
          fi
