name: Run P0 protected audio transitions once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-p0-protected-audio-transitions-once.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout P0 branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/p0-protected-audio-transitions
          fetch-depth: 0

      - name: Decode and apply audited patch
        run: |
          python - <<'PY'
          import base64
          import lzma
          import re
          from pathlib import Path

          workflow = Path('.github/workflows/apply-p0-protected-audio-transitions.yml')
          text = workflow.read_text(encoding='utf-8')
          match = re.search(r'PATCH_XZ_BASE64:\s*"([A-Za-z0-9+/=]+)"', text)
          if not match:
              raise SystemExit('Embedded P0 patch was not found')
          Path('/tmp/p0.patch').write_bytes(lzma.decompress(base64.b64decode(match.group(1))))
          PY
          git apply --check /tmp/p0.patch
          git apply /tmp/p0.patch

      - name: Validate P0 implementation
        run: |
          node --check src/offscreen/offscreen.js
          node scripts/smoke_stability.mjs
          npm run check

      - name: Commit clean P0 branch
        run: |
          rm .github/workflows/apply-p0-protected-audio-transitions.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/offscreen/offscreen.js scripts/smoke_stability.mjs .github/workflows/apply-p0-protected-audio-transitions.yml
          git commit -m "Protect all discontinuous DSP transitions"
          git push origin HEAD:agent/p0-protected-audio-transitions
