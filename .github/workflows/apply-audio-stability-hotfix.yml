name: Apply audio stability hotfix

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/apply_audio_stability_hotfix.py"
      - "scripts/fix_audio_stability_migration.py"
      - ".github/workflows/apply-audio-stability-hotfix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: hotfix/audio-stability-v0.3.103
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Apply hotfix or migration correction
        run: |
          if grep -q '"version": "0.3.103"' manifest.json; then
            python3 scripts/fix_audio_stability_migration.py
          else
            python3 scripts/apply_audio_stability_hotfix.py
            python3 scripts/fix_audio_stability_migration.py
          fi

      - name: Run release-grade validation
        run: |
          npm run release:check
          npm run package
          ZIP=$(find dist -maxdepth 1 -name 'ArSonKuPik-v0.3.103-chrome-web-store.zip' -print -quit)
          test -n "$ZIP"
          unzip -t "$ZIP"
          (cd dist && sha256sum -c SHA256SUMS.txt)

      - name: Create local source commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git restore --staged scripts/apply_audio_stability_hotfix.py scripts/fix_audio_stability_migration.py .github/workflows/apply-audio-stability-hotfix.yml
          git restore scripts/apply_audio_stability_hotfix.py scripts/fix_audio_stability_migration.py .github/workflows/apply-audio-stability-hotfix.yml
          git commit -m "fix: guard legacy performance migration"

      - name: Publish generated source commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: hotfix/audio-stability-v0.3.103
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          branch = os.environ["TARGET_BRANCH"]
          api = f"https://api.github.com/repos/{repo}"

          def request(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  api + path,
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "arsonkupik-audio-stability-hotfix",
                  },
              )
              with urllib.request.urlopen(req) as response:
                  return json.load(response)

          parent = subprocess.check_output(["git", "rev-parse", "HEAD^"], text=True).strip()
          changes = subprocess.check_output(
              ["git", "diff", "--name-status", "--no-renames", "HEAD^", "HEAD"],
              text=True,
          ).splitlines()
          base_commit = request("GET", f"/git/commits/{parent}")
          entries = []
          for line in changes:
              status, path = line.split("\t", 1)
              if status == "D":
                  entries.append({"path": path, "mode": "100644", "type": "blob", "sha": None})
                  continue
              content = open(path, "rb").read()
              blob = request(
                  "POST",
                  "/git/blobs",
                  {"content": base64.b64encode(content).decode("ascii"), "encoding": "base64"},
              )
              entries.append({"path": path, "mode": "100644", "type": "blob", "sha": blob["sha"]})

          tree = request("POST", "/git/trees", {"base_tree": base_commit["tree"]["sha"], "tree": entries})
          commit = request(
              "POST",
              "/git/commits",
              {
                  "message": "fix: guard legacy performance migration",
                  "tree": tree["sha"],
                  "parents": [parent],
              },
          )
          request("PATCH", f"/git/refs/heads/{branch}", {"sha": commit["sha"], "force": False})
          print(f"Published generated source commit {commit['sha']}")
          PY
