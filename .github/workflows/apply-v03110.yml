name: Apply v0.3.110 preset and Studio flow

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/preset-signature-studio-support-v0.3.110'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
      - name: Apply product patch
        run: python scripts/apply_v03110.py
      - name: Validate changed runtime files
        run: |
          node --check src/shared/presets.js
          node --check src/popup/popup.js
          node scripts/smoke_signature_presets.mjs
      - name: Commit product changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Add Mas Ari Signature genre presets and Studio support flow"
          git push origin HEAD:${{ github.head_ref }}
