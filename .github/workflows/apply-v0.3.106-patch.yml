name: Apply v0.3.106 patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/global-state-queue-v0.3.106'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22'

      - name: Apply and validate patch
        shell: bash
        run: |
          set -euo pipefail
          if grep -q '"version": "0.3.106"' manifest.json; then
            echo 'Patch already applied.'
          else
            python3 scripts/apply_v0_3_106_patch.py
          fi
          npm run check
          npm run package
          ZIP=$(find dist -maxdepth 1 -name 'ArSonKuPik-v0.3.106-chrome-web-store.zip' -print -quit)
          test -n "$ZIP"
          unzip -t "$ZIP"
          (cd dist && sha256sum -c SHA256SUMS.txt)

      - name: Commit generated source changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- . ':!.github/workflows/**'
          if git diff --cached --quiet; then
            echo 'No generated changes to commit.'
            exit 0
          fi
          git commit -m 'Implement global state queue for v0.3.106'
          git push origin HEAD:${GITHUB_HEAD_REF}
