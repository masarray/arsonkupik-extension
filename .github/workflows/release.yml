name: Publish release

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - ".release/release.json"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Resolve and verify release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          DESCRIPTOR_VERSION=$(python3 -c "import json; print(json.load(open('.release/release.json'))['version'])")
          DESCRIPTOR_TAG=$(python3 -c "import json; print(json.load(open('.release/release.json'))['tag'])")
          TITLE=$(python3 -c "import json; print(json.load(open('.release/release.json'))['title'])")
          PRERELEASE=$(python3 -c "import json; print(str(json.load(open('.release/release.json')).get('prerelease', False)).lower())")

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            TAG="$DESCRIPTOR_TAG"
          fi

          test "$VERSION" = "$DESCRIPTOR_VERSION"
          test "$TAG" = "v${VERSION}"
          test "$DESCRIPTOR_TAG" = "$TAG"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Run complete release checks
        run: npm run release:check

      - name: Package extension
        run: npm run package

      - name: Verify archive integrity and checksum
        shell: bash
        run: |
          set -euo pipefail
          ZIP="dist/ArSonKuPik-v${{ steps.release.outputs.version }}-chrome-web-store.zip"
          test -f "$ZIP"
          test -f dist/SHA256SUMS.txt
          unzip -t "$ZIP"
          (cd dist && sha256sum -c SHA256SUMS.txt)

      - name: Create or refresh GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          TITLE: ${{ steps.release.outputs.title }}
          VERSION: ${{ steps.release.outputs.version }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          ZIP="dist/ArSonKuPik-v${VERSION}-chrome-web-store.zip"
          ASSETS=("$ZIP" "dist/SHA256SUMS.txt")

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber --repo "$GITHUB_REPOSITORY"
            exit 0
          fi

          FLAGS=(--repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$TITLE" --generate-notes)
          if [[ "$PRERELEASE" == "true" ]]; then
            FLAGS+=(--prerelease)
          else
            FLAGS+=(--latest)
          fi

          gh release create "$TAG" "${ASSETS[@]}" "${FLAGS[@]}"
