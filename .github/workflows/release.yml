name: Publish release

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - ".release/release.json"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"

      - name: Resolve and verify release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          DESCRIPTOR_VERSION=$(python3 -c "import json; print(json.load(open('.release/release.json'))['version'])")
          DESCRIPTOR_TAG=$(python3 -c "import json; print(json.load(open('.release/release.json'))['tag'])")
          TITLE=$(python3 -c "import json; print(json.load(open('.release/release.json'))['title'])")
          PRERELEASE=$(python3 -c "import json; print(str(json.load(open('.release/release.json')).get('prerelease', False)).lower())")

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            TAG="$DESCRIPTOR_TAG"
          fi

          test "$VERSION" = "$DESCRIPTOR_VERSION"
          test "$TAG" = "v${VERSION}"
          test "$DESCRIPTOR_TAG" = "$TAG"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Run complete release checks
        run: npm run release:check

      - name: Package extension
        run: npm run package

      - name: Verify archive integrity and checksum
        shell: bash
        run: |
          set -euo pipefail
          ZIP="dist/ArSonKuPik-v${{ steps.release.outputs.version }}-chrome-web-store.zip"
          test -f "$ZIP"
          test -f dist/SHA256SUMS.txt
          unzip -t "$ZIP"
          (cd dist && sha256sum -c SHA256SUMS.txt)

      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          TITLE: ${{ steps.release.outputs.title }}
          VERSION: ${{ steps.release.outputs.version }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          ZIP="dist/ArSonKuPik-v${VERSION}-chrome-web-store.zip"
          SUMS="dist/SHA256SUMS.txt"
          ASSETS=("$ZIP" "$SUMS")

          verify_tag_target() {
            local tag_sha
            tag_sha=$(git rev-list -n 1 "$TAG")
            test -n "$tag_sha"
            if [[ "$tag_sha" != "$GITHUB_SHA" ]]; then
              echo "Release tag $TAG points to $tag_sha, not current commit $GITHUB_SHA." >&2
              exit 1
            fi
          }

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            verify_tag_target
            tmp_dir=$(mktemp -d)
            trap 'rm -rf "$tmp_dir"' EXIT
            existing_assets=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')

            for asset in "${ASSETS[@]}"; do
              name=$(basename "$asset")
              if grep -Fxq "$name" <<< "$existing_assets"; then
                gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$name" --dir "$tmp_dir"
                cmp -- "$asset" "$tmp_dir/$name"
              else
                gh release upload "$TAG" "$asset" --repo "$GITHUB_REPOSITORY"
              fi
            done

            echo "Existing release assets are byte-identical; no asset was overwritten."
            exit 0
          fi

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            verify_tag_target
          fi

          FLAGS=(--repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$TITLE" --generate-notes)
          if [[ "$PRERELEASE" == "true" ]]; then
            FLAGS+=(--prerelease)
          else
            FLAGS+=(--latest)
          fi

          gh release create "$TAG" "${ASSETS[@]}" "${FLAGS[@]}"
