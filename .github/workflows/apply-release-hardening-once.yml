name: Apply release hardening once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/release-hardening.payload
      - .github/run-release-hardening.sh
      - .github/workflows/apply-release-hardening-once.yml

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Apply and validate release hardening
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git clone -q "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          git checkout -q agent/release-hardening-0.3.111
          bash .github/run-release-hardening.sh
