name: Apply bilingual localization patch once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/i18n-trigger.txt
      - .github/i18n-patch.part-*
      - .github/workflows/apply-i18n-once.yml

permissions:
  contents: write

jobs:
  apply-i18n:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: agent/i18n-popup-studio
    steps:
      - name: Apply, validate, and commit localization
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone -q "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          git checkout -q "$TARGET_BRANCH"
          cat .github/i18n-patch.part-* | base64 --decode | tar -xJf -
          rm -f .github/i18n-trigger.txt .github/i18n-patch.part-*
          if ! npm run check > /tmp/i18n-check.log 2>&1; then
            echo "Repository validation failed. Tail follows:"
            tail -n 35 /tmp/i18n-check.log
            exit 1
          fi
          tail -n 15 /tmp/i18n-check.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Add Indonesian and English Popup and Studio localization"
            git push -q origin HEAD:"$TARGET_BRANCH"
          fi
