name: Apply v0.3.107 runtime hotfix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/runtime-startup-dropdown-v0.3.107'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22'

      - name: Apply and validate hotfix
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply_v0_3_107_patch.py
          node --check src/offscreen/offscreen.js
          node --check src/popup/popup.js
          node --check scripts/smoke_runtime_startup.mjs
          node scripts/run-python.mjs scripts/validate.py
          node scripts/smoke_privacy.mjs
          node scripts/smoke_support.mjs
          node scripts/smoke_stability.mjs
          node scripts/smoke_headless.mjs
          node scripts/smoke_update_queue.mjs
          node scripts/smoke_global_state_queue.mjs
          node scripts/smoke_runtime_startup.mjs
          npm run package
          unzip -t dist/ArSonKuPik-v0.3.107-chrome-web-store.zip
          (cd dist && sha256sum -c SHA256SUMS.txt)

      - name: Commit product changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            manifest.json \
            package.json \
            .release/release.json \
            src/offscreen/offscreen.js \
            src/popup/popup.css \
            scripts/smoke_runtime_startup.mjs \
            README.md \
            docs/index.html \
            docs/id/index.html \
            CHANGELOG.md \
            RELEASE_AUDIT_0.3.107.md
          if git diff --cached --quiet; then
            echo 'Hotfix already applied.'
            exit 0
          fi
          git commit -m 'Fix offscreen startup and preset dropdown for v0.3.107'
          git push origin HEAD:${GITHUB_HEAD_REF}
